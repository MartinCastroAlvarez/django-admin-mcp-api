name: Bug report
description: Something behaves differently from what the README claims.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Before submitting, please
        confirm the issue is with **django-admin-mcp** itself, not with
        django-admin-rest-api (the upstream REST layer). If the bad
        behaviour reproduces against `GET /api/v1/...` directly (without
        the MCP wrapper), please open the issue
        [there](https://github.com/MartinCastroAlvarez/django-admin-rest-api/issues)
        instead — this package is a thin protocol adapter and does not
        own admin behaviour.

  - type: input
    id: version
    attributes:
      label: django-admin-mcp-api version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: rest-api-version
    attributes:
      label: django-admin-rest-api version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: django-version
    attributes:
      label: Django version
      placeholder: "5.2"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: what-expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimum steps a maintainer can paste into the quickstart example to hit the same problem. Prefer raw `curl` over Claude Desktop screenshots.
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output (redact any tokens or session cookies)
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I confirmed this reproduces with the latest `django-admin-mcp-api` from PyPI.
          required: true
        - label: I redacted any PATs, session cookies, or other credentials from the logs above.
          required: true
