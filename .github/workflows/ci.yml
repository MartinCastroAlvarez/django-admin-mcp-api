name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Install project
        run: poetry install --no-interaction
      - name: ruff check
        run: poetry run ruff check django_admin_mcp_api tests
      - name: ruff format --check
        run: poetry run ruff format --check django_admin_mcp_api tests
      - name: mypy
        run: poetry run mypy django_admin_mcp_api
      - name: bandit
        run: poetry run bandit -c pyproject.toml -q -r django_admin_mcp_api

  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: pip-audit
        run: |
          # Upgrade pip first so its own advisory (PYSEC-2026-196, fixed in
          # 26.1.2) doesn't fail the audit — pip is tooling, not a shipped dep.
          poetry run python -m pip install --upgrade -q pip
          poetry run pip-audit

  test:
    name: Tests (Python ${{ matrix.python-version }} / Django ${{ matrix.django }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        django: ["4.2", "5.0", "5.1", "5.2"]
        exclude:
          # Django 4.2 added Python 3.13 support in 4.2.16; pip may
          # still resolve to an earlier 4.2.x so we skip 4.2 + 3.13
          # conservatively. (#622)
          - python-version: "3.13"
            django: "4.2"
        include:
          - python-version: "3.12"
            django: "6.0"
          - python-version: "3.13"
            django: "6.0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      # Swap the Django version via the venv's pip, not `poetry add`.
      # `poetry add` checks the *project's* declared Python range
      # (>=3.10) against Django 6.0's runtime requirement (>=3.12) and
      # refuses, even when the matrix cell is running Python 3.12+. pip
      # installs into the already-resolved venv without re-checking the
      # project markers.
      - name: Pin Django version (${{ matrix.django }})
        run: poetry run pip install --upgrade "django==${{ matrix.django }}.*"
      - name: Show resolved Django
        run: poetry run python -c "import django; print('Django', django.get_version())"
      - name: Run pytest
        run: poetry run pytest -q

  complyedge-trustlint:
    name: ComplyEdge TrustLint (EU AI Act)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install TrustLint (offline compliance linter)
        run: pip install trustlint
      - name: Fetch ComplyEdge rule corpus
        # The published `trustlint` PyPI package does not bundle the rule
        # corpus, so pull it from the public OSS repo and pass it via
        # --rules-dir. (Once trustlint ships the corpus as package data this
        # step can be dropped.)
        run: git clone --depth 1 https://github.com/ComplyEdge/ComplyEdge.git /tmp/complyedge
      - name: Scan AI-facing text for EU AI Act violations
        run: |
          set -uo pipefail
          RULES=/tmp/complyedge/rules/regulations
          # Docs / prompt / system-message files describe behaviour to humans
          # and LLMs — that's the surface an AI-Act linter cares about. Widen
          # these globs if you add dedicated prompt or system-message files.
          rc=0; count=0
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            count=$((count + 1))
            echo "::group::trustlint check $f"
            trustlint --rules-dir "$RULES" check --jurisdiction EU "$f" || rc=1
            echo "::endgroup::"
          done < <(git ls-files '*.md' '*.prompt' '*.system.md')
          if [ "$count" -eq 0 ]; then
            echo "::notice::TrustLint: no AI-facing files matched — nothing to scan."
          fi
          [ "$rc" -eq 0 ] || echo "::error::TrustLint found EU AI Act / compliance violations (see grouped logs above)."
          exit $rc
