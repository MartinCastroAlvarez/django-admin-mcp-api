name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + black + isort + flake8 + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Install project
        run: poetry install --no-interaction
      - name: ruff check
        run: poetry run ruff check django_admin_mcp_api tests
      - name: black --check
        run: poetry run black --check django_admin_mcp_api tests
      - name: isort --check
        run: poetry run isort --check-only django_admin_mcp_api tests
      - name: flake8
        run: poetry run flake8 django_admin_mcp_api tests
      - name: bandit
        run: poetry run bandit -c pyproject.toml -q -r django_admin_mcp_api

  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: pip-audit
        run: poetry run pip-audit

  test:
    name: Tests (Python ${{ matrix.python-version }} / Django ${{ matrix.django }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        django: ["5.0", "5.1", "5.2"]
        include:
          - python-version: "3.12"
            django: "6.0"
          - python-version: "3.13"
            django: "6.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Pin Django version
        run: poetry add "django~=${{ matrix.django }}" --no-interaction
      - name: Install project
        run: poetry install --no-interaction
      - name: Run pytest
        run: poetry run pytest -q
