# Pre-commit hook configuration for django-admin-mcp.
#
# Install once:
#   poetry run pip install pre-commit
#   pre-commit install
#
# Then every `git commit` runs these hooks against the staged diff.

repos:
  # -------------------------------------------------------------------
  # Secret scanning — fail commit if a token-shaped string is added.
  # -------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        args: ["protect", "--staged", "--no-banner", "--redact"]

  # -------------------------------------------------------------------
  # Python formatting + linting (matches scripts/lint.sh and the
  # django-admin-react family conventions).
  # -------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: ^(django_admin_mcp_api|tests|examples)/
      - id: ruff-format
        files: ^(django_admin_mcp_api|tests|examples)/

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 24.8.0
    hooks:
      - id: black
        files: ^(django_admin_mcp_api|tests|examples)/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^(django_admin_mcp_api|tests|examples)/

  # -------------------------------------------------------------------
  # Python security lint (bandit). Runs only over the package, not tests
  # (asserts in tests are fine and would otherwise be noisy).
  # -------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-q", "-r", "django_admin_mcp_api"]
        additional_dependencies: ["bandit[toml]"]
        pass_filenames: false

  # -------------------------------------------------------------------
  # House rules — local pygrep hooks that enforce invariants from
  # SECURITY.md.
  # -------------------------------------------------------------------
  - repo: local
    hooks:
      # No partial / redacted token references anywhere in the diff.
      # The exclude list covers files that legitimately document the
      # forbidden patterns (the rule in SECURITY.md, this config, the
      # security test that scans for them).
      - id: no-partial-tokens
        name: No partial token redactions (e.g., ghp_…XYZ)
        language: pygrep
        entry: '(ghp_|gho_|ghs_|github_pat_|aws_secret_access_key|AKIA[0-9A-Z]{16}|BEGIN (RSA|EC|OPENSSH) PRIVATE)'
        types_or: [text]
        exclude: |
          (?x)^(
            SECURITY\.md
            |\.pre-commit-config\.yaml
            |tests/test_security\.py
          )$

      # No csrf_exempt anywhere in the package — MCP endpoints must
      # honour Django's CSRF middleware. See SECURITY.md §3.
      - id: no-csrf-exempt
        name: No @csrf_exempt in django_admin_mcp_api/
        language: pygrep
        entry: 'csrf_exempt'
        files: '^django_admin_mcp_api/.*\.py$'

      # No direct Model.objects.all/filter in the dispatch layer — every
      # queryset must come from ModelAdmin.get_queryset(). See
      # SECURITY.md §3 and the django-admin-react five rules.
      - id: no-objects-all-in-server
        name: No Model.objects.all/filter in django_admin_mcp_api/server/
        language: pygrep
        entry: 'objects\.(all|filter)\('
        files: '^django_admin_mcp_api/server/.*\.py$'
